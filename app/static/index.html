<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f1c14" />
<link rel="manifest" href="/manifest.json" />
<title>Rootwork</title>
<style>
  :root{
    --ink:#0f1c14; --ink2:#16271b; --parch:#efe7d4; --parch2:#e3d8bf;
    --sage:#7fa07a; --copper:#c0703a; --line:#2c4231; --muted:#9fb39c;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--ink); color:var(--parch);
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  header{padding:22px 20px 8px}
  h1{font-family:"Iowan Old Style","Palatino Linotype",Georgia,serif;
     font-size:30px; letter-spacing:.5px; margin:0; font-weight:600}
  header p{margin:4px 0 0; color:var(--muted); font-size:13px}
  main{padding:14px 16px 40px; max-width:560px; margin:0 auto}
  .shoot{
    display:block; width:100%; border:1px dashed var(--line); border-radius:16px;
    background:var(--ink2); color:var(--sage); padding:28px; text-align:center;
    font-size:16px; cursor:pointer;
  }
  .shoot strong{display:block; color:var(--parch); font-size:18px; margin-bottom:4px}
  input[type=file]{display:none}
  .thumb{width:100%; border-radius:14px; margin:14px 0; display:none}
  .status{color:var(--muted); font-size:14px; text-align:center; min-height:20px; margin:10px 0}
  .card{
    background:var(--parch); color:var(--ink); border-radius:16px; padding:18px;
    margin-top:16px; display:none; box-shadow:0 10px 30px rgba(0,0,0,.35);
  }
  .card h2{font-family:"Iowan Old Style",Georgia,serif; margin:0; font-size:22px}
  .card em{color:#5b6f57; font-style:normal; font-size:14px}
  .row{display:flex; gap:10px; flex-wrap:wrap; margin:12px 0}
  .tag{background:var(--parch2); border-radius:999px; padding:5px 11px; font-size:12.5px; color:#3a4a36}
  .plate{background:#fff; border:1px solid #ddd2b6; border-radius:12px; padding:10px; margin:12px 0}
  .plate svg{width:100%; height:auto; display:block}
  ol{margin:8px 0 0; padding-left:20px} ol li{margin:6px 0; line-height:1.45}
  .seal{
    float:right; width:74px; height:74px; border-radius:50%; display:grid; place-items:center;
    background:radial-gradient(circle at 30% 30%,#d98a52,var(--copper)); color:#fff;
    box-shadow:inset 0 0 0 3px rgba(255,255,255,.35); margin-left:12px;
  }
  .seal b{font-family:Georgia,serif; font-size:26px; line-height:1} .seal span{font-size:9px; opacity:.85}
  .sell{background:var(--ink2); color:var(--parch); border-radius:12px; padding:14px; margin-top:14px}
  .sell .price{color:var(--copper); font-weight:600}
  .links a{display:inline-block; margin:6px 8px 0 0; color:var(--ink);
     text-decoration:none; border-bottom:1.5px solid var(--copper); font-size:14px}
  .err{color:#e2a06a}
  @media (prefers-reduced-motion:no-preference){.card{animation:rise .35s ease}}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<header>
  <h1>Rootwork</h1>
  <p>Photograph a plant — get propagation steps & resale read.</p>
</header>
<main>
  <label class="shoot" for="pick">
    <strong>Take or choose a photo</strong>
    Leaf, stem, or whole plant works best
  </label>
  <input id="pick" type="file" accept="image/*" capture="environment" />
  <img id="thumb" class="thumb" alt="" />
  <div id="status" class="status"></div>

  <article id="card" class="card">
    <div id="seal" class="seal"><b id="score">–</b><span>resale</span></div>
    <h2 id="name"></h2>
    <em id="latin"></em>
    <div class="row" id="tags"></div>
    <div class="plate"><div id="svg"></div></div>
    <ol id="steps"></ol>
    <div class="sell">
      <div id="selltop"></div>
      <div id="sellnotes" style="margin-top:6px;font-size:14px"></div>
    </div>
    <div class="links" id="links" style="margin-top:14px"></div>
  </article>
</main>
<script src="/app.js"></script>
</body>
</html>
