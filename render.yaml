services:
  - type: web
    name: rootwork
    runtime: python
    plan: free
    buildCommand: pip install .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.4"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PLANTNET_API_KEY
        sync: false
